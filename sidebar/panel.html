<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quiet Notes</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <header id="topbar">
    <input id="search" type="search" placeholder="Search notes…" autocomplete="off">
    <button id="new-note" class="icon-btn" title="New note">+</button>
  </header>

  <main id="list-view">
    <ul id="note-list"></ul>
    <p id="empty-hint" hidden>No notes yet.<br>Click <strong>+</strong> to create your first note.</p>
  </main>

  <main id="editor-view" hidden>
    <div id="editor-bar">
      <button id="back" class="icon-btn" title="Back to list (Esc)">←</button>
      <span class="spacer"></span>
      <button id="pin" class="icon-btn" title="Pin note">☆</button>
      <button id="copy-note" class="icon-btn" title="Copy note text">⧉</button>
      <button id="delete" class="icon-btn danger" title="Delete note">🗑</button>
    </div>
    <textarea id="editor" dir="auto" spellcheck="true" placeholder="Type your note…"></textarea>
    <footer id="editor-status">
      <span id="counts"></span>
      <span id="save-state"></span>
    </footer>
  </main>

  <footer id="bottombar">
    <button id="export">Export</button>
    <button id="import">Import</button>
    <input id="import-file" type="file" accept=".json,application/json" hidden>
    <span id="storage-note" title="All notes stay in this browser. Nothing is sent anywhere.">local-only</span>
  </footer>

  <script type="module" src="panel.js"></script>
</body>
</html>
